extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@tag"])
  @contact(
    name: "Commerce Team"
    url: "https://yourorg.slack.com/archives/C_COMMERCE"
    email: "ganesharumugam21@gmail.com"
    description: "Owns order lifecycle, fulfillment, and delivery data. Ping [#commerce-oncall](https://yourorg.slack.com/archives/C_COMMERCE_ONCALL) for urgent issues."
  )

"Annotate a schema with contact information for the subgraph owner"
directive @contact(
  "Contact title of the subgraph owner"
  name: String!
  "URL where the subgraph owner can be reached"
  url: String
  "Email address for the subgraph owner team"
  email: String
  "Other relevant notes; supports markdown links"
  description: String
) on SCHEMA

type Query {
  """
  Get a specific order by ID. Use for order detail and confirmation pages.
  """
  order(id: ID!): Order @tag(name: "public")

  """
  List all orders — internal ops and fulfillment use only.
  """
  orders: [Order] @tag(name: "internal")
}

"""
A customer purchase. Contains the buyer and all purchased variants.
"""
type Order @key(fields: "id") @tag(name: "public") {
  """
  Unique order identifier
  """
  id: ID! @tag(name: "public")

  """
  Internal buyer reference — PII-adjacent, not exposed to storefront consumers.
  """
  buyerId: ID! @tag(name: "internal")

  """
  All variants (products) included in this order
  """
  items: [OrderItem!]! @tag(name: "public")

  """
  Current fulfilment status of the order
  """
  status: OrderStatus! @tag(name: "public")

  """
  ISO 8601 date-time when the order was placed
  """
  placedAt: String! @tag(name: "public")

  """
  Estimated delivery date for this order (ISO 8601).
  Added via Schema Proposal: "Add estimatedDelivery to Order"
  """
  estimatedDelivery: String @tag(name: "public")
}

"""
A single line-item within an order
"""
type OrderItem @tag(name: "public") {
  variant: Variant! @tag(name: "public")
  quantity: Int! @tag(name: "public")
  unitPrice: Float! @tag(name: "public")
}

"""
The lifecycle status of an order
"""
enum OrderStatus @tag(name: "public") {
  PLACED
  PROCESSING
  SHIPPED
  DELIVERED
  CANCELLED
}

type Variant @key(fields: "id", resolvable: false) @tag(name: "public") {
  id: ID! @tag(name: "public")
}
