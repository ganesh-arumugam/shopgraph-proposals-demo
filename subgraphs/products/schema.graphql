extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key"])
  @contact(
    name: "Catalog Team"
    url: "https://yourorg.slack.com/archives/C_CATALOG"
    description: "Owns all product and variant data. Ping [#catalog-oncall](https://yourorg.slack.com/archives/C_CATALOG_ONCALL) for urgent issues."
  )

"Annotate a schema with contact information for the subgraph owner"
directive @contact(
  "Contact title of the subgraph owner"
  name: String!
  "URL where the subgraph owner can be reached"
  url: String
  "Other relevant notes; supports markdown links"
  description: String
) on SCHEMA

type Query {
  """
  Get all available products. Optionally filter by title prefix.
  """
  searchProducts(searchInput: ProductSearchInput! = {}): [Product]

  """
  Get a specific product by ID. Use for product detail pages and checkout.
  """
  product(id: ID!): Product

  """
  Get a specific variant by ID.
  """
  variant(id: ID!): Variant
}

"""
Search filters when querying Products
"""
input ProductSearchInput {
  titleStartsWith: String
}

"""
A product sold in the ShopGraph store. Contains high-level details.
For purchasable items, see Variant.
"""
type Product @key(fields: "id") {
  id: ID!
  title: String!
  description: String
  mediaUrl: String
  category: String

  """
  All purchasable variants of this product (different sizes, colors, etc.)
  """
  variants: [Variant]
}

"""
A purchasable variant of a Product — a unique combination of size, color, and price.
Variants are the entities added to carts and orders.
"""
type Variant @key(fields: "id") {
  id: ID!
  product: Product
  colorway: String
  price: Float!
  size: String
}
