name: Sync Proposal Default Reviewers

# Reads @contact directives from subgraph SDL files and updates the
# GraphOS Proposals default reviewers configuration to match.
#
# This closes the loop between schema ownership (@contact) and governance
# (who reviews proposals that touch each subgraph).
#
# Triggers:
#   - Any change to a subgraph schema (contact info may have changed)
#   - Manual dispatch (for initial setup or re-sync)

on:
  push:
    branches:
      - main
    paths:
      - "subgraphs/products/schema.graphql"
      - "subgraphs/orders/schema.graphql"
      - ".github/contact-reviewer-map.json"
  workflow_dispatch:

jobs:
  sync-reviewers:
    name: "Sync @contact → default reviewers"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix .github/scripts

      - name: Sync default reviewers
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
          APOLLO_GRAPH_ID: ${{ vars.APOLLO_GRAPH_ID }}
        run: |
          node .github/scripts/sync-proposal-reviewers.js
