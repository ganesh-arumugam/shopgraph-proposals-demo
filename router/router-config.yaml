# yaml-language-server: $schema=./router.schema.json
# ^ Config schema emitted by THIS router binary (v2.15.0) via `./router config schema`.
#   Using the binary's own schema avoids version drift in editor validation.
#   Regenerate after a router upgrade: cd router && ./router config schema > router.schema.json

supergraph:
  listen: 127.0.0.1:4000
  introspection: true

# Propagate all incoming headers to subgraphs
headers:
  all:
    request:
      - propagate:
          matching: .*

# Allow local Explorer and client dev server to query the router.
# Router v2 uses a policy-based structure (v1 used a flat `origins` array)
# each policy can set its own methods/headers/credentials for finer control.
cors:
  policies:
    - origins:
        - http://localhost:3000
        - https://studio.apollographql.com

# Enable sandbox in development
sandbox:
  enabled: true
homepage:
  enabled: false

include_subgraph_errors:
  all: true

# ─── Telemetry: Trace Propagation & Logging ─────────────
telemetry:
  exporters:
    tracing:
      common:
        # Service identity in the trace backend. These OTel resource attributes
        # define how the service and environment appear downstream (Jaeger / APM).
        resource:
          "service.name": "apollo-router-local"
          "service.namespace": "shopgraph"
          "deployment.environment.name": "demo"
        # always_on = trace every request. Use a fraction (e.g. 0.1) in production
        # to sample 10% of traffic and control cost/volume.
        sampler: always_on
        # false = the router makes its own sampling decision regardless of the caller's.
        # Set true in production to honor the upstream caller's sample flag instead.
        parent_based_sampler: false
      propagation:
        # Read/forward the W3C `traceparent` header so one trace ID spans
        # client → router → subgraphs. This is what stitches the hops together.
        trace_context: true
      otlp:
        # Export spans via OTLP to the local OTel Collector, which forwards to Jaeger.
        # The collector decouples the router from the backend: adding/swapping a trace
        # destination is a change in observability/otel-collector-config.yml, not here.
        # host 4327 → collector container 4317. See observability/docker-compose.yml.
        enabled: true
        endpoint: http://localhost:4327
        protocol: grpc

    # Metrics for Prometheus to scrape. The router serves /metrics on this
    # host port; the Prometheus container reaches it via host.docker.internal.
    metrics:
      common:
        # Same service identity on metrics (exposed as target_info to Prometheus).
        resource:
          "service.name": "apollo-router-local"
          "service.namespace": "shopgraph"
          "deployment.environment.name": "demo"
      prometheus:
        enabled: true
        listen: 127.0.0.1:9091 # host port — keep distinct from Prometheus UI (:9090)
        path: /metrics

    logging:
      stdout:
        enabled: true
        format:
          # Structured JSON logs so trace fields are machine-parseable (jq, log pipelines).
          json:
            display_current_span: true # include the active span on each log line
            display_span_list: true # include the full span chain (router→supergraph→subgraph)
            display_trace_id: open_telemetry # stamp every line with the trace ID — the key to correlating hops
            display_span_id: true
            # Surface these span attributes (defined under instrumentation.spans) on log lines.
            span_attributes:
              - debug.incoming.traceparent
              - debug.incoming.tracestate
              - debug.router.trace_id

  instrumentation:
    # spans: attach custom attributes to the router span. On their own these only
    # appear in traces / on log lines once an event (below) is emitted in the span.
    spans:
      mode: spec_compliant # OpenTelemetry-standard span naming/attributes
      default_attribute_requirement_level: recommended
      router:
        attributes:
          # Capture the raw inbound trace headers so you can SEE what the client sent
          # (or didn't) — proves whether the router originated or continued the trace.
          "debug.incoming.traceparent":
            request_header: "traceparent"
          "debug.incoming.tracestate":
            request_header: "tracestate"
          # The trace ID the router actually used for this request.
          "debug.router.trace_id":
            trace_id: open_telemetry
      supergraph:
        attributes:
          # Label the trace by the GraphQL operation name so traces are identifiable
          # in Jaeger/APM by operation instead of a generic "supergraph" span.
          graphql.operation.name: true
          resource.name:
            operation_name: string
          # Mark the span as an ERROR when the response carries a GraphQL error, even
          # though the HTTP status is 200. Without this, APMs treat GraphQL errors as
          # successful requests. This is the trace-side complement to the error metric.
          otel.status_code:
            static: ERROR
            condition:
              eq:
                - true
                - on_graphql_error: true
          otel.status_description:
            response_errors: $[0].extensions.code
          error.message:
            response_errors: $[0].message
          graphql.errors:
            on_graphql_error: true
      subgraph:
        attributes:
          # Which subgraph served the hop, and mark errors that originate there.
          subgraph.name: true
          otel.status_code:
            static: ERROR
            condition:
              eq:
                - true
                - subgraph_on_graphql_error: true
          graphql.errors:
            subgraph_on_graphql_error: true
      # Connector spans: when a field is backed by Apollo Connectors, the Router makes
      # the REST call itself and emits connect spans. Surface which REST source, method,
      # and URL template the connector used so the trace shows the outbound API call.
      connector:
        attributes:
          subgraph.name: true
          connector.source.name: true
          connector.http.method: true
          connector.url.template: true

    instruments:
      default_requirement_level: required # enables all http.* by default
      router:
        apollo.router.overhead: true
        http.server.request.duration:
          attributes:
            http.request.method: true
      subgraph:
        http.client.request.duration:
          attributes:
            subgraph.name: true

    # Emit a log line per request at the router stage. Without this, the router
    # logs nothing per-request and the span attributes above never print. The
    # emitted event inherits trace_id (display_trace_id) and the debug.incoming.*
    # span attributes (display_span_list + span_attributes) from logging.stdout.
    # request: info gives one line per request carrying the trace_id and the
    # incoming traceparent (the demo signal). response events are off because
    # they dump the full response body/headers and are very noisy.
    events:
      router:
        request: info
        response: off
      # Outbound hop: log the trace context the router sends to each subgraph,
      # complementing the subgraph's own incoming-header logging.
      subgraph:
        request: info
        response: off
