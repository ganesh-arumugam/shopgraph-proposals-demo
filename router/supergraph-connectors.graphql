type Customer
  @join__type(graph: CUSTOMERS)
{
  id: ID!
  name: String
  username: String
  email: String
  company: String
  city: String
}

input join__ContextArgument {
  name: String!
  type: String!
  context: String!
  selection: join__FieldValue!
}

scalar join__DirectiveArguments

scalar join__FieldSet

scalar join__FieldValue

enum join__Graph {
  CUSTOMERS @join__graph(name: "customers", url: "http://connectors.invalid/placeholder")
  ORDERS @join__graph(name: "orders", url: "http://localhost:4001/orders/graphql")
  PRODUCTS @join__graph(name: "products", url: "http://localhost:4001/products/graphql")
}

scalar link__Import

enum link__Purpose {
  """
  `SECURITY` features provide metadata necessary to securely resolve fields.
  """
  SECURITY

  """
  `EXECUTION` features provide metadata necessary for operation execution.
  """
  EXECUTION
}

"""A customer purchase. Contains the buyer and all purchased variants."""
type Order
  @join__type(graph: ORDERS, key: "id")
  @tag(name: "public")
{
  """Unique order identifier"""
  id: ID! @tag(name: "public")

  """
  Internal buyer reference - PII-adjacent, not exposed to storefront consumers.
  """
  buyerId: ID! @tag(name: "internal")

  """All variants (products) included in this order"""
  items: [OrderItem!]! @tag(name: "public")

  """Current fulfilment status of the order"""
  status: OrderStatus! @tag(name: "public")

  """ISO 8601 date-time when the order was placed"""
  placedAt: String! @tag(name: "public")
}

"""A single line-item within an order"""
type OrderItem
  @join__type(graph: ORDERS)
  @tag(name: "public")
{
  variant: Variant! @tag(name: "public")
  quantity: Int! @tag(name: "public")
  unitPrice: Float! @tag(name: "public")
}

"""The lifecycle status of an order"""
enum OrderStatus
  @join__type(graph: ORDERS)
  @tag(name: "public")
{
  PLACED @join__enumValue(graph: ORDERS)
  PROCESSING @join__enumValue(graph: ORDERS)
  SHIPPED @join__enumValue(graph: ORDERS)
  DELIVERED @join__enumValue(graph: ORDERS)
  CANCELLED @join__enumValue(graph: ORDERS)
}

"""
A product sold in the ShopGraph store. Contains high-level details.
For purchasable items, see Variant.
"""
type Product
  @join__type(graph: PRODUCTS, key: "id")
  @tag(name: "public")
{
  id: ID! @tag(name: "public")
  title: String! @tag(name: "public")
  description: String @tag(name: "public")
  mediaUrl: String @tag(name: "public")

  """
  Internal categorization - used by merchandising and ops, not exposed to storefront.
  """
  category: String @tag(name: "internal")

  """
  All purchasable variants of this product (different sizes, colors, etc.)
  """
  variants: [Variant] @tag(name: "public")
}

"""Search filters when querying Products"""
input ProductSearchInput
  @join__type(graph: PRODUCTS)
{
  titleStartsWith: String @tag(name: "public")
}

type Query
  @join__type(graph: CUSTOMERS)
  @join__type(graph: ORDERS)
  @join__type(graph: PRODUCTS)
{
  """A customer fetched from the REST API by id."""
  customer(id: ID!): Customer @join__field(graph: CUSTOMERS) @join__directive(graphs: [CUSTOMERS], name: "connect", args: {source: "jsonplaceholder", http: {GET: "/users/{$args.id}"}, selection: "id\nname\nusername\nemail\ncompany: company.name\ncity: address.city"})

  """All customers from the REST API."""
  customers: [Customer] @join__field(graph: CUSTOMERS) @join__directive(graphs: [CUSTOMERS], name: "connect", args: {source: "jsonplaceholder", http: {GET: "/users"}, selection: "id\nname\nusername\nemail\ncompany: company.name\ncity: address.city"})

  """
  Get a specific order by ID. Use for order detail and confirmation pages.
  """
  order(id: ID!): Order @join__field(graph: ORDERS) @tag(name: "public")

  """List all orders - internal ops and fulfillment use only."""
  orders: [Order] @join__field(graph: ORDERS) @tag(name: "internal")

  """Get all available products. Optionally filter by title prefix."""
  searchProducts(searchInput: ProductSearchInput! = {}): [Product] @join__field(graph: PRODUCTS) @tag(name: "public")

  """
  Get a specific product by ID. Use for product detail pages and checkout.
  """
  product(id: ID!): Product @join__field(graph: PRODUCTS) @tag(name: "public")

  """Get a specific variant by ID."""
  variant(id: ID!): Variant @join__field(graph: PRODUCTS) @tag(name: "internal")
}

"""
A purchasable variant of a Product - a unique combination of size, color, and price.
Variants are the entities added to carts and orders.
"""
type Variant
  @join__type(graph: ORDERS, key: "id", resolvable: false)
  @join__type(graph: PRODUCTS, key: "id")
  @tag(name: "public")
{
  id: ID! @tag(name: "public")

  """
  Back-reference to parent product - internal use only (avoid N+1 on storefront).
  """
  product: Product @join__field(graph: PRODUCTS) @tag(name: "internal")
  colorway: String @join__field(graph: PRODUCTS) @tag(name: "public")
  price: Float! @join__field(graph: PRODUCTS) @tag(name: "public")
  size: String @join__field(graph: PRODUCTS) @tag(name: "public")
}
