# yaml-language-server: $schema=./router.schema.json
# ^ Schema emitted by the v2.15.0 router binary (`./router config schema`).
#
# PRODUCTION router config - hardened counterpart to router-config.yaml (dev/demo).
# Telemetry profile validated against Apollo Router v2.15.0.
#
# Philosophy vs. the dev config: export SAMPLED TRACES to a collector, keep logs
# structured, and emit lifecycle events NARROWLY. Blanket per-request events
# (events.*.request/response: info) are a debugging tool - they add per-request
# overhead and are intentionally OFF here.

supergraph:
  listen: 0.0.0.0:4000
  # Disable introspection in production - don't expose the schema to the world.
  introspection: false

# Health check for load balancers / k8s probes.
health_check:
  enabled: true
  listen: 0.0.0.0:8088

# Scope header propagation to what subgraphs actually need - NOT ".*".
# (Trace context is propagated by the telemetry layer below, not here.)
headers:
  all:
    request:
      - propagate:
          named: authorization
      - propagate:
          named: x-correlation-id

# Lock CORS to known origins - never use a wildcard in production.
# v2 uses the policy-based structure; each policy can set its own methods/headers.
cors:
  policies:
    - origins:
        - https://your-production-app.example.com   # <-- replace with real origin(s)

# No interactive landing pages in production.
sandbox:
  enabled: false
homepage:
  enabled: false

# Do NOT leak raw subgraph errors to clients in production.
include_subgraph_errors:
  all: false

# --- Telemetry: sampled tracing + structured logging + narrow events ---------
telemetry:
  exporters:
    tracing:
      common:
        # Service identity + environment as it appears in your APM/collector.
        service_name: apollo-router
        resource:
          "deployment.environment.name": "production"
        # Sample a fraction of traffic (0.1 = 10%) to control cost/volume.
        # Tune to your APM budget; raise temporarily when investigating.
        sampler: 0.1
        # Honor the upstream caller's sampling decision so distributed traces
        # stay intact. Set to false ONLY if the router is directly internet-facing
        # (i.e. there is no trusted upstream decision to respect).
        parent_based_sampler: true
        # Bound telemetry volume per span - excess attributes/events/links are
        # dropped silently once these limits are exceeded.
        max_attributes_per_span: 128
        max_events_per_span: 128
        max_links_per_span: 128
      propagation:
        # Keep W3C `traceparent` propagation ON so traces continue across hops.
        trace_context: true
      otlp:
        # Primary production mechanism: ship spans to an OTel collector / APM.
        enabled: true
        endpoint: http://otel-collector:4317   # <-- your collector endpoint
        protocol: grpc

    logging:
      stdout:
        enabled: true
        format:
          # Structured JSON so log pipelines can parse trace fields.
          json:
            display_timestamp: true
            display_level: true
            # Stamp every line with the trace ID - the key to correlating a log
            # line back to a full trace in your APM.
            display_trace_id: open_telemetry
            display_span_id: true
            # Keep lines lean in prod - the span list/current span add noise.
            display_current_span: false
            display_span_list: false
        # Throttle stdout log volume (protects against log floods).
        # NOTE: this rate-limits stdout logging only - it does NOT affect trace export.
        rate_limit:
          capacity: 10
          interval: 1s

  instrumentation:
    # Request/response events OFF in production (they are the debug profile).
    # error: error keeps failures visible without per-request overhead.
    events:
      router:
        request: off
        response: off
        error: error
      supergraph:
        request: off
        response: off
        error: error
      subgraph:
        request: off
        response: off
        error: error

    # -- To debug a live issue WITHOUT global per-request noise, do ONE of: --
    #
    # (1) Conditional event - only log requests carrying a flag header:
    #
    #     events:
    #       router:
    #         request:
    #           level: info
    #           condition:
    #             eq:
    #               - request_header: x-log-request
    #               - "enabled"
    #         response: off
    #         error: error
    #
    # (2) Return the trace ID on the response to correlate a single request:
    #     (place under telemetry.exporters.tracing)
    #
    #     experimental_response_trace_id:
    #       enabled: true
    #       header_name: apollo-trace-id
    #
    # Operational note: run the router at `info` log verbosity (APOLLO_ROUTER_LOG=info).
    # At `error`, some telemetry attributes can be dropped.
