# Prometheus scrapes the HOST-run Apollo Router.
# On macOS/Windows a container reaches the host via host.docker.internal
# (NOT localhost - localhost would be the Prometheus container itself).
global:
  scrape_interval: 5s        # snappy for a live demo
  evaluation_interval: 5s

scrape_configs:
  - job_name: apollo-router
    metrics_path: /metrics
    static_configs:
      # Router's Prometheus exporter (telemetry.exporters.metrics.prometheus.listen = 127.0.0.1:9091)
      - targets: ["host.docker.internal:9091"]
        labels:
          service: apollo-router-local

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]   # Prometheus scraping itself
