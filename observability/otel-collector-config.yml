# OpenTelemetry Collector - sits between the Apollo Router and the trace backend.
#
#   Router (host)  --OTLP gRPC :4327-->  Collector  --OTLP-->  Jaeger (jaeger:4317)
#
# Why a collector: it decouples the router from the backend. Swapping or adding a
# trace backend (Tempo, an APM, a second destination) is a change HERE, not in the
# router config. This mirrors Apollo's pse-toolbox o11y reference setup.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # host publishes 4327 -> this
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Forward traces to the local Jaeger (reachable by service name on the compose network).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Uncomment to see every span on the collector's stdout while debugging:
  # debug:
  #   verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
