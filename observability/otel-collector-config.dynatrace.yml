# OTel Collector config — Dynatrace variant (traces + correlated logs).
#
#   Router (host) --OTLP :4327--> Collector --+--> Jaeger        (traces, local)
#                                             +--> Dynatrace     (traces, OTLP/HTTP + Api-Token)
#   Router stdout log file  -----filelog----> Collector ------> Dynatrace (logs, with trace_id/span_id)
#
# The router has no OTLP log exporter (stdout only), so logs are shipped by tailing the
# router log file (observability/.run/router.log, mounted into the collector). The JSON
# is parsed and trace_id/span_id are lifted onto each log record so Dynatrace correlates
# logs to traces (the "Logs" tab on a trace).
#
# Requires the API token to have BOTH scopes: openTelemetryTrace.ingest AND logs.ingest.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Tail the router's JSON stdout log (mounted from observability/.run/router.log).
  filelog:
    include: [/var/log/shopgraph/router.log]
    start_at: beginning
    operators:
      # Drop the non-JSON banner lines (npm / start_router.sh) before parsing.
      - type: filter
        expr: 'body matches "^[^{]"'
      - type: json_parser
        parse_to: attributes
        on_error: drop_quiet
        # Router timestamps are RFC3339 with nanoseconds (…Z).
        timestamp:
          parse_from: attributes.timestamp
          layout_type: gotime
          layout: "2006-01-02T15:04:05.999999999Z07:00"
        severity:
          parse_from: attributes.level
        # Lift trace context onto the log record so Dynatrace links logs to spans.
        trace:
          trace_id:
            parse_from: attributes.trace_id
          span_id:
            parse_from: attributes.span_id

processors:
  batch: {}
  # Logs batch capped so an export never exceeds Dynatrace's 10 MB payload limit.
  batch/logs:
    send_batch_size: 200
    send_batch_max_size: 400
    timeout: 2s
  # Tag logs with the same service identity as the traces (helps Dynatrace grouping).
  resource/logs:
    attributes:
      - key: service.name
        value: apollo-router-local
        action: insert
      - key: service.namespace
        value: shopgraph
        action: insert
  # Drop the bulky raw request/response fields and span dumps from log records.
  # Trace correlation uses trace_id/span_id (set above), not these; removing them
  # keeps each log small and the Dynatrace log view readable.
  attributes/trim:
    actions:
      - { key: http.request.body, action: delete }
      - { key: http.request.headers, action: delete }
      - { key: http.response.body, action: delete }
      - { key: http.response.headers, action: delete }
      - { key: spans, action: delete }
      - { key: span, action: delete }

exporters:
  # Local trace UI (kept for side-by-side with Dynatrace).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Dynatrace OTLP ingest (traces AND logs). POSTs to <endpoint>/v1/traces and /v1/logs.
  #   DT_OTLP_ENDPOINT example (SaaS): https://<env-id>.live.dynatrace.com/api/v2/otlp
  #   DT_API_TOKEN scopes required:    openTelemetryTrace.ingest, logs.ingest
  otlphttp/dynatrace:
    endpoint: ${env:DT_OTLP_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlphttp/dynatrace]
    logs:
      receivers: [filelog]
      processors: [resource/logs, attributes/trim, batch/logs]
      exporters: [otlphttp/dynatrace]